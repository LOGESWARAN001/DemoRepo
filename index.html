<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/index.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="center">
      <form name="forms">
        <input type="text" id="display" name="display" disabled />
        <div class="buttons">
          <input type="button" id="btn" value="7" />
          <input type="button" id="btn" value="8" />
          <input type="button" id="btn" value="9" />
          <input type="button" id="btn" value="/" /><br />
          <input type="button" id="btn" value="4" />
          <input type="button" id="btn" value="5" />
          <input type="button" id="btn" value="6" />
          <input type="button" id="btn" value="*" /><br />
          <input type="button" id="btn" value="1" />
          <input type="button" id="btn" value="2" />
          <input type="button" id="btn" value="3" />
          <input type="button" id="btn" value="-" /><br />
          <input type="button" id="btn" value="." />
          <input type="button" id="btn" value="0" />
          <input type="button" id="btn" value="+" />
          <input
            type="button"
            id="clear"
            value="C"
            onclick="document.forms.display.value = ''"
          /><br />
          <input
            type="button"
            id="equal"
            value="="
            onclick="calculate()"
          />
        </div>
      </form>
    </div>
    <script type="text/javascript" charset="utf-8" src="js/index.js"></script>
    <script>
      function calculate() {
        const expression = document.forms.display.value;
        // Validate expression: only digits, operators + - * / parentheses and decimal point allowed
        if (/^[0-9+\-*/. ()]+$/.test(expression)) {
          try {
            // Safe evaluation without eval
            const result = safeEval(expression);
            if (typeof result === 'number' && isFinite(result)) {
              document.forms.display.value = result;
            } else {
              alert('Invalid expression');
            }
          } catch (e) {
            alert('Invalid expression');
          }
        } else {
          alert('Invalid characters in expression');
        }
      }

      // Simple safe evaluator for arithmetic expressions
      function safeEval(expr) {
        // Remove all spaces
        expr = expr.replace(/\s+/g, '');

        // Validate characters again
        if (!/^[0-9+\-*/.()]+$/.test(expr)) {
          throw new Error('Invalid characters');
        }

        // Use Function constructor to create a safe function
        // This is safer than eval because it does not have access to local scope
        // but still should be used carefully
        // To be safer, reject expressions with consecutive operators or invalid syntax

        // Basic syntax check: no two operators in a row (except for unary minus)
        if (/[^0-9)]\s*[-+*/]{2,}/.test(expr) || /\(\)/.test(expr)) {
          throw new Error('Invalid syntax');
        }

        // Disallow expressions starting or ending with operators except unary minus at start
        if (/^[+*/]/.test(expr) || /[-+*/]$/.test(expr)) {
          throw new Error('Invalid syntax');
        }

        // Evaluate using Function constructor
        // eslint-disable-next-line no-new-func
        const func = new Function('return ' + expr);
        const val = func();
        if (typeof val !== 'number' || !isFinite(val)) {
          throw new Error('Invalid result');
        }
        return val;
      }
    </script>
  </body>
</html>
