<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/index.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="center">
      <form name="forms">
        <input type="text" id="display" name="display" disabled />
        <div class="buttons">
          <input type="button" id="btn7" value="7" />
          <input type="button" id="btn8" value="8" />
          <input type="button" id="btn9" value="9" />
          <input type="button" id="btnDiv" value="/" /><br />
          <input type="button" id="btn4" value="4" />
          <input type="button" id="btn5" value="5" />
          <input type="button" id="btn6" value="6" />
          <input type="button" id="btnMul" value="*" /><br />
          <input type="button" id="btn1" value="1" />
          <input type="button" id="btn2" value="2" />
          <input type="button" id="btn3" value="3" />
          <input type="button" id="btnSub" value="-" /><br />
          <input type="button" id="btnDot" value="." />
          <input type="button" id="btn0" value="0" />
          <input type="button" id="btnAdd" value="+" />
          <input
            type="button"
            id="clear"
            value="C"
            onclick="document.forms.display.value = ''"
          /><br />
          <input
            type="button"
            id="equal"
            value="="
            onclick="calculate()"
          />
        </div>
      </form>
    </div>
    <script type="text/javascript" charset="utf-8" src="js/index.js"></script>
    <script>
      function calculate() {
        const expression = document.forms.display.value;
        // Validate expression: only digits, operators + - * / parentheses and decimal point allowed
        if (/^[0-9+\-*/. ()]+$/.test(expression)) {
          try {
            // Safe evaluation without eval or Function constructor
            const result = evaluateExpression(expression);
            if (typeof result === 'number' && isFinite(result)) {
              document.forms.display.value = result;
            } else {
              alert('Invalid expression');
            }
          } catch (e) {
            alert('Invalid expression');
          }
        } else {
          alert('Invalid characters in expression');
        }
      }

      // Evaluate arithmetic expression safely without using Function constructor or eval
      function evaluateExpression(expr) {
        // Remove all spaces
        expr = expr.replace(/\s+/g, '');

        // Validate characters again
        if (!/^[0-9+\-*/.()]+$/.test(expr)) {
          throw new Error('Invalid characters');
        }

        // Basic syntax checks
        if (/[^0-9)]\s*[-+*/]{2,}/.test(expr) || /\(\)/.test(expr)) {
          throw new Error('Invalid syntax');
        }

        if (/^[+*/]/.test(expr) || /[-+*/]$/.test(expr)) {
          throw new Error('Invalid syntax');
        }

        // Parse and evaluate the expression using a safe parser
        return parseExpression(expr);
      }

      // Recursive descent parser for arithmetic expressions
      function parseExpression(expr) {
        let index = 0;

        function peek() {
          return expr[index] || '';
        }

        function get() {
          return expr[index++] || '';
        }

        function parseNumber() {
          let numStr = '';
          while (/[0-9.]/.test(peek())) {
            numStr += get();
          }
          if (numStr === '' || numStr.split('.').length > 2) {
            throw new Error('Invalid number');
          }
          return parseFloat(numStr);
        }

        function parseFactor() {
          if (peek() === '(') {
            get(); // consume '('
            const val = parseAddSub();
            if (get() !== ')') {
              throw new Error('Expected )');
            }
            return val;
          } else if (peek() === '-') {
            get();
            return -parseFactor();
          } else {
            return parseNumber();
          }
        }

        function parseMulDiv() {
          let val = parseFactor();
          while (peek() === '*' || peek() === '/') {
            const op = get();
            const nextVal = parseFactor();
            if (op === '*') val *= nextVal;
            else {
              if (nextVal === 0) throw new Error('Division by zero');
              val /= nextVal;
            }
          }
          return val;
        }

        function parseAddSub() {
          let val = parseMulDiv();
          while (peek() === '+' || peek() === '-') {
            const op = get();
            const nextVal = parseMulDiv();
            if (op === '+') val += nextVal;
            else val -= nextVal;
          }
          return val;
        }

        const result = parseAddSub();
        if (index < expr.length) {
          throw new Error('Unexpected characters');
        }
        return result;
      }
    </script>
  </body>
</html>
